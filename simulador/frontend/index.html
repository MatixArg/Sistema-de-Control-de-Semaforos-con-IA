<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Semáforos con IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Simulador de Control de Semáforos con IA</h1>
        <p id="status" class="status-desconectado">Desconectado</p>
    </header>

    <main>
        <section class="seccion">
            <h2>Intersección 4 Vías</h2>
            <div class="fila">
                <canvas id="canvas-4" width="600" height="600"></canvas>
                <div class="panel" id="panel-4"></div>
            </div>
        </section>

        <section class="seccion">
            <h2>Intersección T (3 Vías)</h2>
            <div class="fila">
                <canvas id="canvas-t" width="600" height="600"></canvas>
                <div class="panel" id="panel-t"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
